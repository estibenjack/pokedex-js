<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="search-container">
          <input
            id="search-bar"
            class="search-bar"
            type="text"
            placeholder="Enter a pokémon..."
          />
        </div>
        <div class="logo-container">
          <h1 class="logo-text">Pokédex</h1>
        </div>
      </nav>
    </header>
    <main class="main">
      <div class="filter-container">
        <div class="region-container">
          <p>Filter by region:</p>
          <div class="regions">
            <span data-region="kanto" class="active-filter region">Kanto</span>
            <span data-region="johto" class="region">Johto</span>
            <span data-region="hoenn" class="region">Hoenn</span>
            <span data-region="sinnoh" class="region">Sinnoh</span>
            <span data-region="unova" class="region">Unova</span>
            <span data-region="kalos" class="region">Kalos</span>
            <span data-region="alola" class="region">Alola</span>
            <span data-region="galar" class="region">Galar</span>
            <span data-region="hisui" class="region">Hisui</span>
            <span data-region="paldea" class="region">Paldea</span>
          </div>
        </div>
      </div>
      <div class="pokemon-grid" id="pokemon-grid"></div>
    </main>
    <footer class="footer">
      <p id="footer-text">
        Coded by <a href="https://github.com/estibenjack">Steve</a> ©
      </p>
    </footer>
    <button id="back-to-top" class="back-to-top" title="Go to top">↑</button>
    <script src="./index.js"></script>
  </body>
</html>
