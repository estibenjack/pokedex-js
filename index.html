<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="search-container">
          <input
            id="search-bar"
            class="search-bar"
            type="text"
            placeholder="Enter a pokémon..."
          />
        </div>
        <div class="logo-container">
          <h1 class="logo-text">Pokédex</h1>
        </div>
      </nav>
    </header>
    <main class="main">
      <div class="pokemon-grid" id="pokemon-grid"></div>
    </main>
    <footer class="footer">
      <p>Coded by <a href="https://github.com/estibenjack">Steve</a> ©</p>
    </footer>
    <script src="./index.js"></script>
  </body>
</html>
